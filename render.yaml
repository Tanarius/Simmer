services:
  - type: web
    name: mealprep
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
